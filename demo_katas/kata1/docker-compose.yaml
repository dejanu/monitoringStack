services:
  prom:
    image: prom/prometheus
    container_name: prom
    ports:
      - "9091:9090"
    networks:
      - demo

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    depends_on:
      - prom
    networks:
      - demo

networks:
  demo:
    name: demo